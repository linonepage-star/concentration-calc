<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 濃度配製計算系統</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 15px;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            color: #0f766e;
            font-size: 22px;
        }
        .header p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: #f8fafc;
        }
        .input-group input:focus {
            outline: none;
            border-color: #0d9488;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }
        .results {
            background-color: #f0fdf4;
            border: 1.5px solid #bbf7d0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 15px;
            border-top: 1px dashed #bbf7d0;
        }
        .result-label {
            font-weight: 600;
            color: #166534;
            font-size: 16px;
        }
        .result-value {
            font-weight: 700;
            font-size: 22px;
            color: #15803d;
        }
        .error-message {
            background-color: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            border: 1px solid #fecaca;
            text-align: center;
        }
        .unit {
            font-size: 14px;
            color: #64748b;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="header">
            <h2>濃度配製計算系統</h2>
            <p>即時濃度與水量換算工具</p>
        </div>

        <div class="input-group">
            <label for="origPpm">原液濃度 (ppm)</label>
            <input type="number" id="origPpm" placeholder="例如: 600" inputmode="numeric">
        </div>

        <div class="input-group">
            <label for="targetPpm">稀釋後目標濃度 (ppm)</label>
            <input type="number" id="targetPpm" placeholder="例如: 100" inputmode="numeric">
        </div>

        <div class="input-group">
            <label for="targetVol">稀釋後總體積 (公升)</label>
            <input type="number" id="targetVol" placeholder="例如: 30" inputmode="numeric">
        </div>

        <div id="errorMessage" class="error-message">
            ⚠️ 稀釋後濃度不能大於原液濃度！
        </div>

        <div class="results" id="resultsBlock">
            <div class="result-row">
                <span class="result-label">需加入原液：</span>
                <span class="result-value"><span id="outOrig">0.00</span> <span class="unit">公升</span></span>
            </div>
            <div class="result-row">
                <span class="result-label">需加入清水：</span>
                <span class="result-value"><span id="outWater">0.00</span> <span class="unit">公升</span></span>
            </div>
        </div>
    </div>

    <script>
        const origPpmInput = document.getElementById('origPpm');
        const targetPpmInput = document.getElementById('targetPpm');
        const targetVolInput = document.getElementById('targetVol');
        
        const outOrig = document.getElementById('outOrig');
        const outWater = document.getElementById('outWater');
        const errorMessage = document.getElementById('errorMessage');
        const resultsBlock = document.getElementById('resultsBlock');

        function calculate() {
            const origPpm = parseFloat(origPpmInput.value);
            const targetPpm = parseFloat(targetPpmInput.value);
            const targetVol = parseFloat(targetVolInput.value);

            // 檢查是否皆有輸入數值
            if (isNaN(origPpm) || isNaN(targetPpm) || isNaN(targetVol) || origPpm <= 0) {
                outOrig.textContent = '0.00';
                outWater.textContent = '0.00';
                errorMessage.style.display = 'none';
                resultsBlock.style.opacity = '0.5';
                return;
            }

            // 防呆：目標濃度不可大於原液濃度
            if (targetPpm > origPpm) {
                errorMessage.style.display = 'block';
                outOrig.textContent = '0.00';
                outWater.textContent = '0.00';
                resultsBlock.style.opacity = '0.5';
                return;
            }

            errorMessage.style.display = 'none';
            resultsBlock.style.opacity = '1';

            // 計算邏輯
            // 原液需求量 = (目標濃度 * 總體積) / 原液濃度
            const requiredOrig = (targetPpm * targetVol) / origPpm;
            // 加水量 = 總體積 - 原液需求量
            const requiredWater = targetVol - requiredOrig;

            // 顯示結果，取到小數點後兩位
            outOrig.textContent = requiredOrig.toFixed(2);
            outWater.textContent = requiredWater.toFixed(2);
        }

        // 監聽輸入事件，達成即時計算
        origPpmInput.addEventListener('input', calculate);
        targetPpmInput.addEventListener('input', calculate);
        targetVolInput.addEventListener('input', calculate);

        // 初始狀態設定
        resultsBlock.style.opacity = '0.5';
    </script>
</body>
</html>
